# Serves the built Vite app and reverse-proxies API/photo requests to the
# backend container (service name "backend" from docker-compose.yml).
# Both "/" (inspector app) and "/admin" (admin console) are client-side
# routes handled by src/App.jsx, so any path that isn't a real static file
# or an /api|/uploads request falls back to index.html.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Evidence photos are sent as base64 in the JSON body; the backend caps the
    # decoded image at MAX_UPLOAD_BYTES (8 MiB default), which is ~11 MiB of
    # base64 plus JSON overhead. nginx's 1 MiB default would 413 real uploads
    # before they ever reach the backend, so raise it to match with headroom.
    client_max_body_size 12m;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;

        # Security headers for the app document + static assets. (API/photo
        # responses are proxied and already carry X-Content-Type-Options from
        # the backend.) camera/geolocation are kept enabled for same-origin —
        # the inspector flow needs the QR scanner and GPS.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(self), geolocation=(self), microphone=()" always;

        # Enable once a TLS-terminating proxy sits in front of this service:
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        # A Content-Security-Policy belongs here too, but the admin 3D map view
        # needs verifying against it first (workers/wasm/tiles) so it isn't
        # switched on blind. Suggested starting point:
        # add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'" always;
    }
}
