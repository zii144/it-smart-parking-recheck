# Serves the built Vite app and reverse-proxies API/photo requests to the
# backend container (service name "backend" from docker-compose.yml).
# Both "/" (inspector app) and "/admin" (admin console) are client-side
# routes handled by src/App.jsx, so any path that isn't a real static file
# or an /api|/uploads request falls back to index.html.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
