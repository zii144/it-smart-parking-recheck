name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (pytest / SQLite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prototype/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        run: pytest

  backend-migrations:
    name: Alembic migrations (PostgreSQL)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: parking
          POSTGRES_PASSWORD: parking
          POSTGRES_DB: parking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parking -d parking"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://parking:parking@localhost:5432/parking
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prototype/backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Verify the real deployment path: migrations apply cleanly against
      # Postgres, and roll back and forward again (catches irreversible or
      # dialect-specific migrations before they hit production).
      - name: Upgrade to head
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Upgrade to head again
        run: alembic upgrade head

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prototype/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: prototype/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
